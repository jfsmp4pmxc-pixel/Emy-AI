name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Thiết lập phiên bản Xcode ổn định
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Kéo mã nguồn và Đổ thẳng PythonKit vào App
      run: |
        # Tải PythonKit về
        git clone https://github.com/pvieito/PythonKit.git --depth=1
        
        # Tạo một file tạm chứa toàn bộ mã nguồn Swift của PythonKit
        mkdir -p tmp_pythonkit
        find PythonKit -name "*.swift" ! -path "*Tests*" ! -name "Package.swift" -exec cat {} + >> tmp_pythonkit/CombinedPythonKit.swift
        
        # Xóa bỏ dòng import PythonKit thừa thãi trong file Bridge gốc của bạn (nếu có)
        if [ -f "EmptyStudioAI/PythonBridge.swift" ]; then
          sed -i '' '/import PythonKit/d' EmptyStudioAI/PythonBridge.swift
        fi
        
        # Nối thẳng toàn bộ mã nguồn PythonKit vào đuôi file PythonBridge.swift để Xcode tự nhận diện nội bộ
        cat tmp_pythonkit/CombinedPythonKit.swift >> EmptyStudioAI/PythonBridge.swift
        echo "Đã hợp nhất PythonKit vào làm một với PythonBridge.swift!"

    - name: Tạo file cấu hình Xcode Mini
      run: |
        mkdir -p EmptyStudioAI.xcodeproj
        cat > EmptyStudioAI.xcodeproj/project.pbxproj << 'EOF'
        // !$*UTF8*$!
        {
            archiveVersion = 1;
            classes = {};
            objectVersion = 56;
            objects = {
                /* Begin PBXBuildFile section */
                0001 /* App.swift */ = {isa = PBXBuildFile; fileRef = 1001; };
                0002 /* Bridge.swift */ = {isa = PBXBuildFile; fileRef = 1002; };
                0003 /* View.swift */ = {isa = PBXBuildFile; fileRef = 1003; };
                /* End PBXBuildFile section */

                /* Begin PBXFileReference section */
                1001 /* App.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = EmptyStudioAIApp.swift; sourceTree = "<group>"; };
                1002 /* Bridge.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = PythonBridge.swift; sourceTree = "<group>"; };
                1003 /* View.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = ContentView.swift; sourceTree = "<group>"; };
                1004 /* Info.plist */ = {isa = PBXFileReference; lastKnownFileType = text.plist.xml; path = Info.plist; sourceTree = "<group>"; };
                /* End PBXFileReference section */

                /* Begin PBXFrameworksBuildPhase section */
                2001 /* Frameworks */ = {isa = PBXFrameworksBuildPhase; buildActionMask = 2147483647; files = (); runOnlyForDeploymentPostprocessing = 0; };
                /* End PBXFrameworksBuildPhase section */

                /* Begin PBXGroup section */
                3001 /* CustomGroup */ = {
                    isa = PBXGroup;
                    children = (1001, 1002, 1003, 1004);
                    path = EmptyStudioAI;
                    sourceTree = "<group>";
                };
                /* End PBXGroup section */

                /* Begin PBXNativeTarget section */
                4001 /* EmptyStudioAI */ = {
                    isa = PBXNativeTarget;
                    buildConfigurationList = 5001 /* Build configuration list for PBXNativeTarget "EmptyStudioAI" */;
                    buildPhases = (6001 /* Sources */, 2001 /* Frameworks */);
                    buildRules = ();
                    dependencies = ();
                    name = EmptyStudioAI;
                    productName = EmptyStudioAI;
                    productReference = 4002 /* EmptyStudioAI.app */;
                    productType = "com.apple.product-type.application";
                };
                /* End PBXNativeTarget section */

                /* Begin PBXProject section */
                4000 /* Project object */ = {
                    isa = PBXProject;
                    attributes = { LastUpgradeCheck = 1540; };
                    buildConfigurationList = 5000 /* Build configuration list for PBXProject */;
                    compatibilityVersion = "Xcode 14.0";
                    developmentRegion = en;
                    hasScannedForEncodings = 0;
                    knownRegions = (en, Base);
                    mainGroup = 3001 /* CustomGroup */;
                    productRefGroup = 3001;
                    projectDirPath = "";
                    projectRoot = "";
                    targets = (4001 /* EmptyStudioAI */);
                };
                /* End PBXProject section */

                /* Begin PBXSourcesBuildPhase section */
                6001 /* Sources */ = {
                    isa = PBXSourcesBuildPhase;
                    buildActionMask = 2147483647;
                    files = (0001, 0002, 0003);
                    runOnlyForDeploymentPostprocessing = 0;
                };
                /* End PBXSourcesBuildPhase section */

                /* Begin XCBuildConfiguration section */
                7001 /* Release Project */ = {
                    isa = XCBuildConfiguration;
                    buildSettings = {
                        SDKROOT = iphoneos;
                        SUPPORTED_PLATFORMS = "iphoneos";
                    };
                    name = Release;
                };
                7002 /* Release Target */ = {
                    isa = XCBuildConfiguration;
                    buildSettings = {
                        CODE_SIGNING_ALLOWED = NO;
                        CODE_SIGNING_REQUIRED = NO;
                        DONT_RUN_CODE_SIGN_STYLE_BUILD_POST_PROCESS = YES;
                        GENERATE_INFOPLIST_FILE = YES;
                        INFOPLIST_KEY_CFBundleIdentifier = "com.emptystudio.EmptyStudioAI";
                        INFOPLIST_KEY_CFBundleName = "EmptyStudioAI";
                        INFOPLIST_KEY_Executable_Name = "EmptyStudioAI";
                        INFOPLIST_KEY_UILaunchScreen_StoryboardName = "";
                        INFOPLIST_KEY_UISupportedInterfaceOrientations = "UIInterfaceOrientationPortrait";
                        IPHONEOS_DEPLOYMENT_TARGET = 15.0;
                        LD_RUNPATH_SEARCH_PATHS = "$(inherited) @executable_path/Frameworks";
                        PRODUCT_BUNDLE_IDENTIFIER = "com.emptystudio.EmptyStudioAI";
                        PRODUCT_NAME = "EmptyStudioAI";
                        SWIFT_VERSION = 5.0;
                        TARGETED_DEVICE_FAMILY = "1";
                    };
                    name = Release;
                };
                /* End XCBuildConfiguration section */

                /* Begin XCConfigurationList section */
                5000 /* Build configuration list for PBXProject */ = {
                    isa = XCConfigurationList;
                    buildConfigurations = (7001 /* Release Project */);
                    defaultConfigurationName = Release;
                    defaultConfigurationIsVisible = 0;
                };
                5001 /* Build configuration list for PBXNativeTarget "EmptyStudioAI" */ = {
                    isa = XCConfigurationList;
                    buildConfigurations = (7002 /* Release Target */);
                    defaultConfigurationName = Release;
                    defaultConfigurationIsVisible = 0;
                };
                /* End XCConfigurationList section */
            };
            rootObject = 4000 /* Project object */;
        }
        EOF

    - name: Build bằng xcodebuild chính thống (Không ký mã)
      run: |
        xcodebuild -project EmptyStudioAI.xcodeproj \
                   -scheme EmptyStudioAI \
                   -configuration Release \
                   -sdk iphoneos \
                   -destination "generic/platform=iOS" \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   clean build

    - name: Đóng gói IPA chuẩn Apple
      run: |
        mkdir -p build/Payload
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "EmptyStudioAI.app" -type d | head -n 1)
        cp -R "$APP_PATH" build/Payload/
        
        if [ -f "EmptyStudioAI/EmyEngine.py" ]; then
            cp "EmptyStudioAI/EmyEngine.py" build/Payload/EmptyStudioAI.app/
        fi
        
        cd build
        zip -r EmptyStudioAI.ipa Payload

    - name: Đẩy file IPA lên Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: EmptyStudioAI-trollstore
        path: build/EmptyStudioAI.ipa