name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Thiết lập phiên bản Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Biên dịch ứng dụng từ Swift Package
      run: |
        # Dùng lệnh xcodebuild truyền thống kết hợp ép định dạng build cho Swift Package
        xcodebuild -scheme EmptyStudioAI \
                   -configuration Release \
                   -sdk iphoneos \
                   -destination "generic/platform=iOS" \
                   CODE_SIGNING_ALLOWED=NO \
                   clean build

    - name: Đóng gói thành file IPA (TrollStore Compatible)
      run: |
        mkdir -p build/Payload
        # Tìm chính xác file .app vừa được đẻ ra trong thư mục DerivedData mặc định
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "EmptyStudioAI.app" -type d | head -n 1)
        if [ -z "$APP_PATH" ]; then
          APP_PATH=$(find . -name "EmptyStudioAI.app" -type d | head -n 1)
        fi
        
        echo "Tìm thấy App tại đường dẫn: $APP_PATH"
        cp -r "$APP_PATH" build/Payload/
        cd build
        zip -r EmptyStudioAI.ipa Payload
        
    - name: Tải file IPA lên Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: EmptyStudioAI-trollstore
        path: build/EmptyStudioAI.ipa