name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Thiết lập phiên bản Xcode ổn định
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Khởi tạo thư mục đóng gói ứng dụng
      run: |
        rm -rf build
        mkdir -p build/Payload/EmptyStudioAI.app

    - name: Kéo mã nguồn thư viện PythonKit về
      run: |
        git clone https://github.com/pvieito/PythonKit.git --depth=1
        mkdir -p PythonKitSource
        find PythonKit -name "*.swift" ! -path "*Tests*" ! -name "Package.swift" -exec cp {} PythonKitSource/ \;

    - name: Xóa dòng import PythonKit thừa thãi trong code của App
      run: |
        if [ -f "EmptyStudioAI/PythonBridge.swift" ]; then
          sed -i '' '/import PythonKit/d' EmptyStudioAI/PythonBridge.swift
        fi

    - name: Biên dịch Tổng lực (Bơm đủ Framework Đồ họa cho iOS)
      run: |
        ALL_SWIFT_FILES=$(find EmptyStudioAI PythonKitSource -name "*.swift")
        SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        
        xcrun -sdk iphoneos swiftc \
              -target arm64-apple-ios15.0 \
              -sdk "$SDK_PATH" \
              -F "$SDK_PATH/System/Library/Frameworks" \
              -framework SwiftUI \
              -framework UIKit \
              -framework Foundation \
              -Xlinker -rpath -Xlinker /usr/lib/swift \
              -Xlinker -rpath -Xlinker @executable_path/Frameworks \
              -O \
              -parse-as-library \
              $ALL_SWIFT_FILES \
              -o build/Payload/EmptyStudioAI.app/EmptyStudioAI

    - name: Tự cấu trúc file Info.plist chuẩn chỉ (Trùng khớp tên 100%)
      run: |
        cat > build/Payload/EmptyStudioAI.app/Info.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>EmptyStudioAI</string>
            <key>CFBundleIdentifier</key>
            <string>com.emptystudio.EmptyStudioAI</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>EmptyStudioAI</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleSignature</key>
            <string>????</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>MinimumOSVersion</key>
            <string>15.0</string>
            <key>UIDeviceFamily</key>
            <array>
                <integer>1</integer>
            </array>
            <key>UILaunchScreen</key>
            <dict/>
            <key>UISupportedInterfaceOrientations</key>
            <array>
                <string>UIInterfaceOrientationPortrait</string>
            </array>
        </dict>
        </plist>
        EOF

    - name: CẤP QUYỀN THỰC THI CHO BINARY (Sửa lỗi "Hộp lạ")
      run: |
        # Ép file thực thi phải có quyền chạy, nếu không iOS sẽ từ chối nhận diện bản chất file
        chmod +x build/Payload/EmptyStudioAI.app/EmptyStudioAI

    - name: Nhồi nhét tài nguyên bổ trợ (Python Engine nếu có)
      run: |
        if [ -f "EmptyStudioAI/EmyEngine.py" ]; then
            cp "EmptyStudioAI/EmyEngine.py" build/Payload/EmptyStudioAI.app/
        fi

    - name: Nén toàn bộ cấu trúc thành file IPA chuẩn TrollStore
      run: |
        cd build
        # Dùng tham số -r để giữ nguyên thuộc tính quyền thực thi (chmod +x) khi nén zip
        zip -r EmptyStudioAI.ipa Payload

    - name: Đẩy file IPA lên mục Artifacts của GitHub
      uses: actions/upload-artifact@v4
      with:
        name: EmptyStudioAI-trollstore
        path: build/EmptyStudioAI.ipa