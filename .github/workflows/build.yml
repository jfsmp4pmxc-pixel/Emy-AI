name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Thiết lập phiên bản Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Biên dịch ứng dụng từ Swift Package
      run: |
        xcodebuild -packagePath . \
                   -scheme EmptyStudioAI \
                   -configuration Release \
                   -sdk iphoneos \
                   CODE_SIGNING_ALLOWED=NO \
                   clean build

    - name: Đóng gói thành file IPA (TrollStore Compatible)
      run: |
        mkdir -p build/Payload
        # Sao chép gói .app được sinh ra vào thư mục đóng gói
        cp -r .build/artifacts/ios/release/EmptyStudioAI.app build/Payload/ 2>/dev/null || cp -r $(find .build -name "EmptyStudioAI.app" -type d | head -n 1) build/Payload/
        cd build
        zip -r EmptyStudioAI.ipa Payload
        
    - name: Tải file IPA lên Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: EmptyStudioAI-trollstore
        path: build/EmptyStudioAI.ipa