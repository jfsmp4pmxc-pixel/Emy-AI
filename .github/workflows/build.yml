name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Thiết lập phiên bản Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Tự dựng cấu trúc Xcode Project thuần gốc
      run: |
        rm -rf EmptyStudioAI.xcodeproj
        mkdir -p EmptyStudioAI.xcodeproj
        
        # Tự viết file project.pbxproj bằng cơm - Ép chết objectVersion = 56 (Xcode 15)
        cat > EmptyStudioAI.xcodeproj/project.pbxproj << 'EOF'
        // !$*UTF8*$!
        {
            archiveVersion = 1;
            classes = {
            };
            objectVersion = 56;
            objects = {
                /* Các định danh giả lập tối giản để xcodebuild nhận diện cấu trúc */
                1D6058900E113A3E00F8E0C4 /* EmptyStudioAI */ = {
                    isa = PBXNativeTarget;
                    buildConfigurationList = 1D6058960E113A3E00F8E0C4 /* Build configuration list for PBXNativeTarget "EmptyStudioAI" */;
                    buildPhases = (
                        1D60588D0E113A3E00F8E0C4 /* Sources */,
                    );
                    buildRules = (
                    );
                    dependencies = (
                    );
                    name = EmptyStudioAI;
                    productName = EmptyStudioAI;
                    productReference = 1D6058910E113A3E00F8E0C4 /* EmptyStudioAI.app */;
                    productType = "com.apple.product-type.application";
                };
                29B57011FDCFA73211CA2CEA /* Main Group */ = {
                    isa = PBXGroup;
                    children = (
                        1D6058910E113A3E00F8E0C4 /* EmptyStudioAI.app */,
                    );
                    sourceTree = "<group>";
                };
                1D60588D0E113A3E00F8E0C4 /* Sources */ = {
                    isa = PBXSourcesBuildPhase;
                    buildActionMask = 2147483647;
                    files = (
                    );
                    runOnlyForDeploymentPostprocessing = 0;
                };
                1D6058910E113A3E00F8E0C4 /* EmptyStudioAI.app */ = {
                    isa = PBXFileReference;
                    explicitFileType = wrapper.application;
                    includeInIndex = 0;
                    path = EmptyStudioAI.app;
                    sourceTree = BUILT_PRODUCTS_DIR;
                };
                29B57012FDCFA73211CA2CEA /* Project object */ = {
                    isa = PBXProject;
                    attributes = {
                        LastUpgradeCheck = 1500;
                    };
                    buildConfigurationList = C01FCF4E08A954B50054247B /* Build configuration list for PBXProject "EmptyStudioAI" */;
                    compatibilityVersion = "Xcode 15.0";
                    developmentRegion = en;
                    hasScannedForEncodings = 1;
                    knownRegions = (
                        en,
                        Base,
                    );
                    mainGroup = 29B57011FDCFA73211CA2CEA /* Main Group */;
                    productRefGroup = 29B57011FDCFA73211CA2CEA /* Main Group */;
                    projectDirPath = "";
                    projectRoot = "";
                    targets = (
                        1D6058900E113A3E00F8E0C4 /* EmptyStudioAI */,
                    );
                };
                1D6058940E113A3E00F8E0C4 /* Release */ = {
                    isa = XCBuildConfiguration;
                    buildSettings = {
                        ALWAYS_SEARCH_USER_PATHS = NO;
                        ASSETCATALOG_COMPILER_APPICON_NAME = AppIcon;
                        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME = AccentColor;
                        BUNDLE_LOADER = "$(TEST_HOST)";
                        CLANG_ANALYZER_NONNULL = YES;
                        CLANG_WARN_DOCUMENTATION_COMMENTS = YES;
                        CLANG_WARN_QUERIES_AS_ERRORS = YES;
                        CODE_SIGNING_ALLOWED = NO;
                        CODE_SIGN_IDENTITY = "";
                        CODE_SIGN_STYLE = Manual;
                        CURRENT_PROJECT_VERSION = 1;
                        GENERATE_INFOPLIST_FILE = YES;
                        INFOPLIST_KEY_CFBundleDisplayName = EmptyStudioAI;
                        INFOPLIST_KEY_UIRequiredDeviceCapabilities = arm64;
                        INFOPLIST_KEY_UISupportedInterfaceOrientations = UIInterfaceOrientationPortrait;
                        IPHONEOS_DEPLOYMENT_TARGET = 15.0;
                        MARKETING_VERSION = 1.0;
                        PRODUCT_BUNDLE_IDENTIFIER = com.emptystudio.EmptyStudioAI;
                        PRODUCT_NAME = "$(TARGET_NAME)";
                        SWIFT_VERSION = 5.0;
                        TARGETED_DEVICE_FAMILY = "1";
                    };
                    name = Release;
                };
                C01FCF4F08A954B50054247B /* Release */ = {
                    isa = XCBuildConfiguration;
                    buildSettings = {
                        CODE_SIGNING_ALLOWED = NO;
                    };
                    name = Release;
                };
                1D6058960E113A3E00F8E0C4 /* Build configuration list for PBXNativeTarget "EmptyStudioAI" */ = {
                    isa = XCConfigurationList;
                    buildConfigurations = (
                        1D6058940E113A3E00F8E0C4 /* Release */,
                    );
                    defaultConfigurationIsVisible = 0;
                    defaultConfigurationName = Release;
                };
                C01FCF4E08A954B50054247B /* Build configuration list for PBXProject "EmptyStudioAI" */ = {
                    isa = XCConfigurationList;
                    buildConfigurations = (
                        C01FCF4F08A954B50054247B /* Release */,
                    );
                    defaultConfigurationIsVisible = 0;
                    defaultConfigurationName = Release;
                };
            };
            rootObject = 29B57012FDCFA73211CA2CEA /* Project object */;
        }
        EOF

    - name: Biên dịch ứng dụng (Sử dụng cấu trúc ép cứng)
      run: |
        xcodebuild -project EmptyStudioAI.xcodeproj \
                   -target EmptyStudioAI \
                   -configuration Release \
                   -sdk iphoneos \
                   CODE_SIGNING_ALLOWED=NO \
                   clean build

    - name: Đóng gói thành file IPA (TrollStore Compatible)
      run: |
        mkdir -p build/Payload
        cp -r build/Release-iphoneos/EmptyStudioAI.app build/Payload/
        cd build
        zip -r EmptyStudioAI.ipa Payload
        
    - name: Tải file IPA lên Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: EmptyStudioAI-trollstore
        path: build/EmptyStudioAI.ipa