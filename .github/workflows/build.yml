name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Thiết lập phiên bản Xcode ổn định
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Khởi tạo thư mục đóng gói ứng dụng
      run: |
        rm -rf build
        mkdir -p build/Payload/EmptyStudioAI.app

    - name: Kéo mã nguồn thư viện PythonKit về build thủ công
      run: |
        # Clone PythonKit chính chủ từ Apple/Swift community về để build chung
        git clone https://github.com/pvieito/PythonKit.git --depth=1
        
        # Gom toàn bộ file Swift của thư viện PythonKit lại
        PYTHONKIT_FILES=$(find PythonKit/Sources/PythonKit -name "*.swift")
        
        echo "Biên dịch thư viện PythonKit sang dạng Module..."
        # Tạo thư mục chứa file module tạm thời
        mkdir -p build/Modules
        
        # Biên dịch PythonKit thành một mô-đun tĩnh cho iOS arm64
        xcrun -sdk iphoneos swiftc \
              -target arm64-apple-ios15.0 \
              -O \
              -emit-module -emit-module-path build/Modules/PythonKit.swiftmodule \
              -module-name PythonKit \
              -parse-as-library \
              $PYTHONKIT_FILES \
              -o build/Modules/libPythonKit.a

    - name: Biên dịch mã nguồn EmptyStudioAI (Liên kết kèm PythonKit)
      run: |
        SWIFT_FILES=$(find EmptyStudioAI -name "*.swift")
        echo "Các file mã nguồn app sẽ biên dịch:"
        echo "$SWIFT_FILES"
        
        # Biên dịch app chính, chỉ định đường dẫn module bằng -I và thư viện bằng -L
        xcrun -sdk iphoneos swiftc \
              -target arm64-apple-ios15.0 \
              -O \
              -I build/Modules \
              -L build/Modules \
              -lPythonKit \
              $SWIFT_FILES \
              -o build/Payload/EmptyStudioAI.app/EmptyStudioAI

    - name: Tự cấu trúc file Info.plist chuẩn cơm mẹ nấu
      run: |
        cat > build/Payload/EmptyStudioAI.app/Info.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>EmptyStudioAI</string>
            <key>CFBundleIdentifier</key>
            <string>com.emptystudio.EmptyStudioAI</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>EmptyStudioAI</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>MinimumOSVersion</key>
            <string>15.0</string>
            <key>UIDeviceFamily</key>
            <array>
                <integer>1</integer>
            </array>
            <key>UILaunchBlankScreen</key>
            <true/>
        </dict>
        </plist>
        EOF

    - name: Nhồi nhét tài nguyên bổ trợ (Python Engine nếu có)
      run: |
        if [ -f "EmptyStudioAI/EmyEngine.py" ]; then
            cp "EmptyStudioAI/EmyEngine.py" build/Payload/EmptyStudioAI.app/
            echo "Đã đóng gói EmyEngine.py vào App Bundle."
        fi

    - name: Nén toàn bộ cấu trúc thành file IPA chuẩn TrollStore
      run: |
        cd build
        zip -r EmptyStudioAI.ipa Payload
        echo "Đã tạo xong file IPA thành công!"

    - name: Đẩy file IPA lên mục Artifacts của GitHub
      uses: actions/upload-artifact@v4
      with:
        name: EmptyStudioAI-trollstore
        path: build/EmptyStudioAI.ipa